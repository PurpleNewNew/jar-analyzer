name: jar analyzer build

on:
  workflow_dispatch:

env:
  VERSION: "6.0"

jobs:

  build:
    runs-on: windows-latest
    steps:
      - name: checkout the source
        uses: actions/checkout@v4

      - name: set up java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: build agent
        run: mvn -B clean package -DskipTests --file agent/pom.xml

      - name: build core
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: build release layout
        run: python build.py

      - name: bundle jre-8
        run: |
          $dest = "release\\jar-analyzer-${{ env.VERSION }}-full\\jre"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$env:JAVA_HOME\\*" -Destination $dest -Recurse
        shell: pwsh

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-analyzer-${{ env.VERSION }}
          path: |
            release/jar-analyzer-${{ env.VERSION }}-system
            release/jar-analyzer-${{ env.VERSION }}-full
