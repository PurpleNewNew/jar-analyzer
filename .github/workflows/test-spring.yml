name: test core

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: maven

      - name: ensure JBR 21 + JCEF runtime
        run: |
          if [ -f "$JAVA_HOME/jmods/jcef.jmod" ]; then
            echo "JBR with JCEF detected: $JAVA_HOME"
            exit 0
          fi

          JBR_VERSION="21.0.10"
          JBR_BUILD="1163.108"
          JBR_FILE="jbr_jcef-${JBR_VERSION}-linux-x64-b${JBR_BUILD}.tar.gz"
          JBR_URL="https://cache-redirector.jetbrains.com/intellij-jbr/${JBR_FILE}"
          JBR_DIR="/tmp/jbr-jcef"

          echo "Fallback downloading JBR JCEF: ${JBR_FILE}"
          curl -fsSL "${JBR_URL}" -o /tmp/jbr-jcef.tar.gz
          mkdir -p "${JBR_DIR}"
          tar -xzf /tmp/jbr-jcef.tar.gz -C "${JBR_DIR}"
          JBR_HOME="$(find "${JBR_DIR}" -maxdepth 1 -type d -name "jbr_jcef-${JBR_VERSION}-linux-x64-b${JBR_BUILD}*" | head -n1)"
          if [ -z "${JBR_HOME}" ]; then
            echo "Downloaded JBR JCEF package has unexpected layout"
            exit 1
          fi

          if [ ! -f "${JBR_HOME}/jmods/jcef.jmod" ]; then
            echo "Downloaded JBR JCEF still misses jcef.jmod"
            exit 1
          fi

          echo "JAVA_HOME=${JBR_HOME}" >> $GITHUB_ENV
          echo "${JBR_HOME}/bin" >> $GITHUB_PATH
      - name: download test file
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://raw.githubusercontent.com/jar-analyzer/test/refs/heads/main/javasec-1.15.jar -O javasec-1.15.jar
          wget https://github.com/4ra1n/test-springboot/releases/download/0.0.1/test-0.0.1-SNAPSHOT.jar -O test-0.0.1-SNAPSHOT.jar
      - name: run maven core test
        run: mvn test -Dtest=SpringCoreTest#testRun
      - name: run maven custom test
        run: mvn test -Dtest=SpringCustomTest#testRun
      - name: clean test file
        run: rm -f javasec-1.15.jar && rm -rf test-0.0.1-SNAPSHOT.jar
